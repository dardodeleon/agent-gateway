version: 1.3.4

cache: true

endpoints:
  custom:
    - name: "Anthropic"
      apiKey: "${ANTHROPIC_API_KEY}"
      models:
        default:
          - claude-sonnet-4-20250514
          - claude-haiku-4-20250414
        fetch: false
    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://ollama:11434/v1"
      models:
        default:
          - llama3.2
          - Qwen2.5:7b
        fetch: true
      titleConvo: true
      titleModel: "llama3.2"
      modelDisplayLabel: "Ollama"

mcpServers:
  task-registry:
    type: streamable-http
    url: http://mcp_task_registry:8001/mcp
    timeout: 30000
    initTimeout: 15000
    title: "Task Registry"
    description: "Registro de tareas: listar agentes, enviar tareas y consultar estado"
    chatMenu: true
  agent-gateway:
    type: streamable-http
    url: http://mcp_agent_gateway:8003/mcp
    timeout: 330000
    initTimeout: 15000
    title: "Agent Gateway"
    description: "Gateway simplificado: enviar tareas y consultar estado con selección directa de agente"
    chatMenu: true

mcpSettings:
  allowedDomains:
    - "mcp_task_registry"
    - "mcp_agent_gateway"
    - "ollama"
