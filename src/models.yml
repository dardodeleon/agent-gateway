    max_tokens: 4096

  o1-default:
    provider: openai
    model_id: o1
    temperature: 1.0
    max_tokens: 8192

  # Google Gemini (GOOGLE_API_KEY) 

  gemini-flash:
    provider: gemini
    model_id: gemini-2.5-flash
