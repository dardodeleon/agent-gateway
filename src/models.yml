#  Swarm defaults 
# https://strandsagents.com/latest/documentation/docs/user-guide/concepts/multi-agent/swarm/#how-swarms-work
 
swarm_defaults:
  max_handoffs: 20
  max_iterations: 20
  execution_timeout: 900.0
  node_timeout: 300.0
  repetitive_handoff_detection_window: 8
  repetitive_handoff_min_unique_agents: 3
